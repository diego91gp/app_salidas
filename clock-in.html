<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>FICHAR</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./pages/clock-in/clock-in.css" />
  </head>
  <body>
    <a href="./index.html"><img class="global-top-logo" src="assets/images/siroko_warehouse.png" alt="SIROKO" /></a>
    <main class="app-shell">

      <section class="panel" id="screen-operator">
        <h1 class="idle-title">CONTROL HORARIO</h1>
        <img class="ope-image" src="assets/images/operator_example.png" alt="OPERARIO" />
        <h2>ESCANEAR ID OPERARIO</h2>
        <form id="form-operator-scan" class="scan-form">
          <input
            id="input-operator-ean"
            type="text"
            inputmode="none"
            autocomplete="off"
            placeholder="EAN OPERARIO"
            readonly
            required
          />
        </form>
      </section>

      <section class="panel hidden" id="screen-action">
        <h2 id="action-operator-name">OPERARIO</h2>
        <div class="fichar-chrono hidden" id="fichar-chrono">
          <div class="fichar-chrono-time" id="fichar-chrono-time">00:00:00</div>
          <p class="fichar-chrono-since" id="fichar-chrono-since">EN CURSO DESDE --:--</p>
        </div>
        <div class="idle-card-grid fichar-actions">
          <button class="idle-card" id="btn-entrada" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 14.5"/></svg>
            <span>FICHAR ENTRADA</span>
          </button>
          <button class="idle-card" id="btn-salida" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 14.5"/></svg>
            <span>FICHAR SALIDA</span>
          </button>
        </div>
        <a class="btn btn-ghost fichar-back" href="./index.html">VOLVER AL MENÚ PRINCIPAL</a>
      </section>

      <div class="fichar-confirm hidden" id="fichar-confirm">
        <p class="fichar-confirm-msg" id="fichar-confirm-msg"></p>
        <div class="cta-row fichar-actions">
          <button class="btn btn-warn" id="btn-confirm-yes" type="button">CONFIRMAR</button>
          <button class="btn btn-ghost" id="btn-confirm-no" type="button">CANCELAR</button>
        </div>
      </div>

      <section class="panel panel-loading hidden" id="screen-loading">
        <div class="loading-spinner" aria-hidden="true"></div>
        <h2 id="loading-title">CARGANDO...</h2>
      </section>

      <section class="panel panel-success hidden" id="screen-success">
        <div class="check-wrap" aria-hidden="true">
          <svg class="check-svg" viewBox="0 0 72 72">
            <circle class="check-circle" cx="36" cy="36" r="30"></circle>
            <path class="check-mark" d="M22 37l9 9 19-19"></path>
          </svg>
        </div>
        <h2 id="success-title">COMPLETADO</h2>
      </section>

      <section class="panel panel-error hidden" id="screen-error">
        <div class="x-wrap" aria-hidden="true">
          <svg class="x-svg" viewBox="0 0 72 72">
            <circle class="x-circle" cx="36" cy="36" r="30"></circle>
            <path class="x-mark" d="M24 24l24 24"></path>
            <path class="x-mark x-mark-second" d="M48 24L24 48"></path>
          </svg>
        </div>
        <h2>ERROR</h2>
        <p id="error-text"></p>
      </section>

<div class="error-banner hidden" id="error-banner"></div>
    </main>

    <script src="../env-config.js"></script>
    <script src="./pages/clock-in/clock-in.js"></script>
  </body>
</html>
