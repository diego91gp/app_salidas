<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escaneo Cajas</title>
<script src="../env-config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1a1d27;
    border-bottom: 2px solid #2d3142;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #ffffff;
  }

  #status {
    margin-left: auto;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  #status.idle    { background: #2d3142; color: #7b82a0; }
  #status.loading { background: #1e3a5f; color: #60aaff; }
  #status.ok      { background: #0d3320; color: #4cde85; }
  #status.error   { background: #3d1414; color: #ff6b6b; }

  .scan-bar {
    padding: 14px 20px;
    background: #13151f;
    border-bottom: 1px solid #2d3142;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #scan-input {
    flex: 1;
    background: #1a1d27;
    border: 1.5px solid #2d3142;
    border-radius: 8px;
    color: #e8eaf0;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #scan-input:focus { border-color: #4f7dff; }
  #scan-input::placeholder { color: #4a4f6a; }

  .scan-bar button {
    background: #4f7dff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .scan-bar button:hover { background: #3d6ae8; }

  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #7b82a0;
    padding: 8px 10px;
    border-bottom: 1px solid #2d3142;
  }

  tbody tr {
    border-bottom: 1px solid #1e2130;
    animation: fadeIn 0.25s ease;
  }
  tbody tr:hover { background: #1a1d27; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  tbody td {
    padding: 10px;
    vertical-align: middle;
    font-size: 13px;
  }

  td.td-foto img {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 6px;
    background: #1a1d27;
    display: block;
  }
  td.td-foto .no-img {
    width: 56px;
    height: 56px;
    border-radius: 6px;
    background: #2d3142;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  td.td-nombre { color: #c8cce0; max-width: 180px; }
  td.td-nombre .nombre { font-weight: 600; font-size: 13px; color: #e8eaf0; }
  td.td-nombre .code  { font-size: 11px; color: #7b82a0; margin-top: 2px; }

  td.td-talla {
    font-weight: 700;
    font-size: 15px;
    color: #ffffff;
    min-width: 50px;
  }

  td.td-uds input {
    width: 70px;
    background: #1a1d27;
    border: 1.5px solid #2d3142;
    border-radius: 6px;
    color: #e8eaf0;
    font-size: 15px;
    font-weight: 700;
    padding: 6px 8px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  td.td-uds input:focus { border-color: #4f7dff; }

  td.td-del button {
    background: none;
    border: none;
    color: #4a4f6a;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  td.td-del button:hover { color: #ff6b6b; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #4a4f6a;
    font-size: 14px;
  }

  footer {
    padding: 14px 20px;
    background: #13151f;
    border-top: 1px solid #2d3142;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #resumen {
    font-size: 12px;
    color: #7b82a0;
  }
  #resumen span {
    color: #e8eaf0;
    font-weight: 700;
  }

  #btn-traspaso {
    background: #1e3320;
    color: #4cde85;
    border: 1.5px solid #2d6640;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: not-allowed;
    opacity: 0.5;
  }
  #btn-traspaso.ready {
    cursor: pointer;
    opacity: 1;
    transition: background 0.15s;
  }
  #btn-traspaso.ready:hover { background: #2a4a2e; }
</style>
</head>
<body>

<header>
  <h1>&#x1F4E6; Escanea Etiquetas Caja</h1>
  <div id="status" class="idle">LISTO</div>
</header>

<div class="scan-bar">
  <input id="scan-input" type="text" placeholder="Escanear o escribir código de caja..." autocomplete="off" autofocus>
  <button onclick="procesarScan()">Añadir</button>
</div>

<div class="table-wrap">
  <table id="tabla">
    <thead>
      <tr>
        <th>Foto</th>
        <th>Artículo</th>
        <th>Talla</th>
        <th>Uds</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty">Escanea una caja para empezar</div>
</div>

<footer>
  <div id="resumen">Cajas: <span id="n-cajas">0</span> &nbsp;|&nbsp; Total uds: <span id="n-uds">0</span></div>
  <button id="btn-traspaso">TRASPASO</button>
</footer>

<script>
const API_BASE = String(window.ENV_CONFIG?.BASE_URL || '').replace(/\/+$/, '');
const API_KEY  = String(window.ENV_CONFIG?.API_KEY || '');
const AUTH     = window.ENV_CONFIG?.AUTHORIZATION_TOKEN
    ? `Basic ${window.ENV_CONFIG.AUTHORIZATION_TOKEN}`
    : '';

const $input    = document.getElementById('scan-input');
const $tbody    = document.getElementById('tbody');
const $empty    = document.getElementById('empty');
const $status   = document.getElementById('status');
const $nCajas   = document.getElementById('n-cajas');
const $nUds     = document.getElementById('n-uds');
const $traspaso = document.getElementById('btn-traspaso');

const filas = [];

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter') procesarScan();
});

function setStatus(tipo, texto) {
  $status.className = tipo;
  $status.textContent = texto;
}

async function procesarScan() {
  const code = $input.value.trim();
  if (!code) return;
  $input.value = '';
  $input.focus();

  setStatus('loading', 'BUSCANDO...');

  try {
    const url = `${API_BASE}/api/api_box_scan?apikey=${API_KEY}&code=${encodeURIComponent(code)}`;
    const res  = await fetch(url, { headers: { Authorization: AUTH } });
    const data = await res.json();

    if (!res.ok) {
      setStatus('error', data.error || 'NO ENCONTRADA');
      setTimeout(() => setStatus('idle', 'LISTO'), 2000);
      return;
    }

    if (filas.find(f => f.code === data.code128)) {
      setStatus('error', 'YA ESCANEADA');
      setTimeout(() => setStatus('idle', 'LISTO'), 2000);
      return;
    }

    añadirFila({
      code:   data.code128,
      foto:   data.art_image || '',
      nombre: data.art_name  || code,
      talla:  data.talla     || '—',
      uds:    data.uds       || 0
    });

    setStatus('ok', 'OK');
    setTimeout(() => setStatus('idle', 'LISTO'), 1500);

  } catch (e) {
    console.error(e);
    setStatus('error', 'ERROR');
    setTimeout(() => setStatus('idle', 'LISTO'), 2000);
  }
}

function añadirFila({ code, foto, nombre, talla, uds }) {
  const tr = document.createElement('tr');

  const imgHtml = foto
    ? `<img src="${foto}" alt="" onerror="this.parentElement.innerHTML='<div class=no-img>📦</div>'">`
    : `<div class="no-img">📦</div>`;

  tr.innerHTML = `
    <td class="td-foto">${imgHtml}</td>
    <td class="td-nombre">
      <div class="nombre">${escHtml(nombre)}</div>
      <div class="code">${escHtml(code)}</div>
    </td>
    <td class="td-talla">${escHtml(talla)}</td>
    <td class="td-uds"><input type="number" min="0" value="${uds}" onchange="actualizarResumen()"></td>
    <td class="td-del"><button onclick="eliminarFila(this)" title="Eliminar">✕</button></td>
  `;

  filas.push({ code, tr });
  $tbody.prepend(tr);
  $empty.style.display = 'none';
  actualizarResumen();
}

function eliminarFila(btn) {
  const tr = btn.closest('tr');
  const idx = filas.findIndex(f => f.tr === tr);
  if (idx !== -1) filas.splice(idx, 1);
  tr.remove();
  if (!filas.length) $empty.style.display = '';
  actualizarResumen();
}

function actualizarResumen() {
  let totalUds = 0;
  $tbody.querySelectorAll('td.td-uds input').forEach(inp => {
    totalUds += parseInt(inp.value) || 0;
  });
  $nCajas.textContent = filas.length;
  $nUds.textContent   = totalUds;
  $traspaso.classList.toggle('ready', filas.length > 0);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
